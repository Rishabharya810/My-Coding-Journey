<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Basics</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Font Import -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <h1 id="main-heading">CSS Selectors</h1>
    
    <p class="intro-text">
        This paragraph is styled using a <strong>Class Selector</strong>. Classes can be used many times.
    </p>

    <p>
        This is a standard paragraph styled by the <strong>Element Selector</strong>.
    </p>

    <ul>
        <li>Item One</li>
        <li class="highlight">Item Two (Highlighted)</li>
        <li>Item Three</li>
    </ul>

</body>
</html>
