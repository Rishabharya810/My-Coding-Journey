<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inline CSS Example</title>
</head>
<body style="background-color: #f6fafd; font-family: Arial, sans-serif; margin: 0; padding: 20px; color: #22304a;">
  <h1 style="color: #22304a; text-align: center; margin-bottom: 50px; font-size: 48px; font-weight: 600; letter-spacing: 1px;">
   <u style="text-decoration-color: #b3c6e6;">Welcome to My Website</u>
  </h1>
  <h2 style="color: #3a5ca8; font-size: 28px; margin-top: 40px; font-weight: 500;">How to Use the <code style='background: #eaf1fb; color: #3a5ca8; padding: 2px 4px; border-radius: 3px;'>code</code> Tag</h2>
  <p style="color: #3a4a5c; font-size: 20px;">To show code in your HTML, wrap it with the <code style='background: #eaf1fb; color: #3a5ca8; padding: 2px 4px; border-radius: 3px;'>code</code> tag. For example:</p>
  <p style="background: #eaf1fb; color: #22304a; padding: 8px 12px; border-radius: 4px; font-size: 18px; display: inline-block; margin-bottom: 24px;"><code style='background: none; color: #3a5ca8; padding: 0;'>print(&quot;Hello, World!&quot;)</code></p>
  <p style="color: #3a5ca8; font-size: 22px; line-height: 1.5; margin-top: 36px;">
    This is an example of inline CSS. Every style is applied directly to the element using the <code style='background: #eaf1fb; color: #3a5ca8; padding: 2px 4px; border-radius: 3px;'>style</code> attribute.
  </p>
  <a href="https://example.com" style="color: #3a5ca8; text-decoration: underline; font-weight: 500; font-size: 18px;">Learn More</a>
  <footer style="margin-top: 40px; text-align: center; color: #b3c6e6; font-size: 15px; letter-spacing: 1px;">
    © 2025 My Website
  </footer>
</body>
</html>
