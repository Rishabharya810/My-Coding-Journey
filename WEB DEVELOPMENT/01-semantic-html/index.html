<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Developer Blog</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Articles</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <article>
            <h2>Why I Started Coding</h2>
            <p>This is my first blog post. I am using the <strong>article</strong> tag because this content stands alone.</p>
        </article>

        <section>
            <h3>Comments</h3>
            <p>This section groups related content together.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 Web Dev Journey</p>
    </footer>

</body>
</html>
