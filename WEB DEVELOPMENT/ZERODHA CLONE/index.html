<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zerodha - Premium</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #f8fafc, #e2e8f0);
    }
    header {
      background: #ffffff;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header img {
      height: 30px;
    }
    header nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #2d3748;
      font-weight: 500;
      transition: color 0.3s ease;
    }
    header nav a:hover {
      color: #007bff;
    }
    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(to bottom, #e6f7ff, #ffffff);
    }
    .hero img {
      max-width: 80%;
      height: auto;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      transition: transform 0.3s ease;
    }
    .hero img:hover {
      transform: scale(1.05);
    }
    .cta {
      text-align: center;
      padding: 40px 20px;
      background: #ffffff;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      margin: 20px auto;
      max-width: 800px;
    }
    .cta h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #2b6cb0;
    }
    .cta p {
      font-size: 1.25rem;
      color: #4a5568;
      margin-bottom: 30px;
    }
    .cta a {
      background-color: #007bff;
      color: white;
      padding: 12px 25px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }
    .cta a:hover {
      background-color: #0056b3;
      transform: scale(1.05);
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #f7fafc;
      color: #4a5568;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div>
      <img src="https://zerodha.com/static/images/logo.svg" alt="Zerodha Logo">
    </div>
    <nav>
      <a href="#">Signup</a>
      <a href="#">About</a>
      <a href="#">Products</a>
      <a href="#">Pricing</a>
      <a href="#">Support</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section class="hero">
    <img src="https://zerodha.com/static/images/landing.png" alt="Dashboard UI Preview">
  </section>

  <!-- CTA Section -->
  <section class="cta">
    <h1>Invest in Everything</h1>
    <p>
      Online platform to invest in stocks, derivatives, mutual funds, ETFs, bonds, and more.
    </p>
    <a href="#">Sign up for free</a>
  </section>

  <!-- Footer -->
  <footer>
    © 2025 Zerodha. All rights reserved.
  </footer>
</body>
</html>
