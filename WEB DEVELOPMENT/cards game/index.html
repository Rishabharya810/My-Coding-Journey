<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Game - 21</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Welcome to 21!</h1>
        <div class="game-status">
            <div class="status-item">
                <h2>Score: <span id="score">100</span></h2>
            </div>
            <div class="status-item">
                <h2>Health: <span id="health">100</span>%</h2>
            </div>
        </div>

        <div class="game-area">
            <div id="cards-container"></div>
            <h2>Sum: <span id="sum">0</span></h2>
            <div id="message"></div>
        </div>

        <div class="controls">
            <button id="startGame" class="start-button">Start Game</button>
            <button id="drawCard" disabled>Draw Card</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
